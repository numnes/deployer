# Runner PM2 — build e start no host (sem Docker para a aplicação).
runner: pm2

build:
  - npm ci
  - npm run build

# Caminho relativo à raiz do repositório para o pm2 start.
target: dist/main.js

# Opcional: envs base no repositório (após build/target).
# No deploy, o dashboard (projeto + override da instância) sobrescreve estas chaves.
# env:
#   NODE_ENV: production
