name: Demo (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/demo-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-demo
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install & build static demo
        working-directory: web
        env:
          NEXT_PUBLIC_DEMO: "1"
          NEXT_PUBLIC_API_URL: https://demo.local
          # Project Pages URL: https://<user>.github.io/<repo>/
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          npm ci
          npm run build:demo
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
