# Copy to your app repo: .github/workflows/deploy-preview.yml
# Repository secrets: DEPLOYER_API_URL, DEPLOYER_API_KEY
# PROJECT_SLUG is set by deployer project init
# Image is built on GitHub and pushed to __DEPLOYER_REGISTRY__/__DEPLOYER_IMAGE_NAME__
name: Deploy preview (deployer — Docker remote)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - homologation

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: __DEPLOYER_REGISTRY__
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: image
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          SLUG="$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/^-*//;s/-*$//')"
          TAG="preview-${SLUG}-${{ github.sha }}"
          IMAGE="__DEPLOYER_REGISTRY__/__DEPLOYER_IMAGE_NAME__:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Request preview deploy
        env:
          DEPLOYER_API_URL: ${{ secrets.DEPLOYER_API_URL }}
          DEPLOYER_API_KEY: ${{ secrets.DEPLOYER_API_KEY }}
          PROJECT_SLUG: __DEPLOYER_PROJECT_SLUG__
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          if [ -z "$DEPLOYER_API_URL" ] || [ -z "$DEPLOYER_API_KEY" ]; then
            echo "Set repository secrets DEPLOYER_API_URL and DEPLOYER_API_KEY."
            exit 1
          fi
          BRANCH="${{ github.head_ref || github.ref_name }}"
          curl -fsS -X POST "${DEPLOYER_API_URL%/}/deploy" \
            -H "Content-Type: application/json" \
            -H "X-Deployer-Api-Key: ${DEPLOYER_API_KEY}" \
            -d "{\"project\":\"${PROJECT_SLUG}\",\"branch\":\"${BRANCH}\",\"image\":\"${IMAGE}\"}"
